<!DOCTYPE html> 
<html lang="pt-br"> 
  <head> 
    <meta charset="UTF-8" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Flashcards de Mitos e Verdades - Diário de uma Paixão</title> 
    <style>
      :root {
        --romantic-navy: #af52dd;
        --romantic-blue: #a8dadc;
        --romantic-pink: #e63946;
        --success: #2ecc71;
        --danger: #e74c3c;
        --light-bg: #f1faee;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Georgia', serif;
        background-color: var(--light-bg);
        color: var(--romantic-navy);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      header {
        background-color: var(--romantic-navy);
        color: white;
        text-align: center;
        padding: 25px 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      }

      header h1 {
        font-size: 1.8rem;
        margin-bottom: 5px;
      }

      header p {
        font-style: italic;
        color: var(--romantic-blue);
        font-size: 1rem;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card-container {
        width: 340px;
        height: 520px;
        perspective: 1000px;
        cursor: pointer;
      }

      .card {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        border-radius: 15px;
      }

      .card.flipped {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        padding: 25px;
        text-align: center;
        background-color: white;
        border: 2px solid rgba(29, 53, 87, 0.1);
      }

      .card-front {
        justify-content: flex-start;
        align-items: center;
      }

      .card-image {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      }

      .card-front h2 {
        font-size: 1.25rem;
        line-height: 1.5;
        font-weight: normal;
        margin-top: auto;
        margin-bottom: auto;
      }

      .card-back {
        background-color: #fffdf9;
        transform: rotateY(180deg);
        justify-content: center;
        align-items: center;
      }

      .answer-text {
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 25px;
      }

      .badge {
        display: inline-block;
        padding: 6px 20px;
        border-radius: 20px;
        color: white;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.9rem;
        letter-spacing: 1px;
        font-family: sans-serif;
      }

      .badge.mito { background-color: var(--danger); }
      .badge.verdade { background-color: var(--success); }

      .controls {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      button {
        padding: 12px 35px;
        border: none;
        border-radius: 25px;
        background-color: var(--romantic-navy);
        color: white;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 0.9rem;
        cursor: pointer;
        transition: transform 0.2s, background-color 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }

      button:hover {
        background-color: #2a476c;
        transform: translateY(-2px);
      }

      .progress {
        font-family: sans-serif;
        font-size: 0.85rem;
        color: var(--romantic-navy);
        opacity: 0.8;
      }

      footer {
        background-color: var(--romantic-navy);
        color: #a8dadc;
        text-align: center;
        padding: 15px;
        font-size: 0.85rem;
        font-family: sans-serif;
      }
    </style>
  </head> 
  <body> 
    <header> 
      <h1>Diário de uma Paixão</h1>
      <p>Descubra os Mitos e Verdades por trás dos bastidores</p>
    </header> 
 
    <main> 
      <div class="card-container" onclick="flipCard()">
        <div class="card" id="flashcard">
          <!-- Frente do Cartão -->
          <div class="card-face card-front">
            <img id="card-img" class="card-image" src="" alt="Cena do filme">
            <h2 id="question-text">Carregando...</h2>
          </div>
          <!-- Verso do Cartão -->
          <div class="card-face card-back">
            <p id="answer-text">Carregando...</p>
            <span id="answer-badge" class="badge">Mito</span>
          </div>
        </div>
      </div>

      <div class="controls">
        <button onclick="nextCard()">Próximo Cartão</button>
        <div class="progress" id="card-progress">1 de 6</div>
      </div>
    </main> 
 
    <footer> 
      <p>Clique no cartão para revelar a resposta verdadeira.</p>
    </footer>
