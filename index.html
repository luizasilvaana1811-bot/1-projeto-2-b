<!DOCTYPE html> 
<html lang="pt-br"> 
  <head> 
    <meta charset="UTF-8" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Flashcards de Mitos e Verdades - Diário de uma Paixão</title> 
    <style>
      :root {
        --romantic-pink: #d4a373;
        --romantic-blue: #a8dadc;
        --navy: #1d3557;
        --success: #2ecc71;
        --danger: #e74c3c;
        --light-bg: #f1faee;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Georgia', serif;
        background-color: var(--light-bg);
        color: var(--navy);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      header {
        background-color: var(--navy);
        color: white;
        text-align: center;
        padding: 30px 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      }

      header h1 {
        font-size: 2rem;
        margin-bottom: 5px;
      }

      header p {
        font-style: italic;
        color: var(--romantic-blue);
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card-container {
        width: 340px;
        height: 460px;
        perspective: 1000px;
        cursor: pointer;
      }

      .card {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        border-radius: 12px;
      }

      .card.flipped {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 35px;
        text-align: center;
        border: 2px solid rgba(29, 53, 87, 0.1);
      }

      .card-front {
        background-color: white;
        background-image: radial-gradient(var(--romantic-blue) 0.5px, transparent 0.5px), radial-gradient(var(--romantic-blue) 0.5px, #ffffff 0.5px);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
      }

      .card-front h2 {
        font-size: 1.35rem;
        line-height: 1.5;
        font-weight: normal;
      }

      .card-back {
        background-color: #fffdf9;
        transform: rotateY(180deg);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .answer-content {
        margin-auto: auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 100%;
      }

      .answer-content p {
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .badge {
        display: inline-block;
        padding: 6px 20px;
        border-radius: 20px;
        color: white;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.9rem;
        letter-spacing: 1px;
        font-family: sans-serif;
        align-self: center;
      }

      .badge.mito { background-color: var(--danger); }
      .badge.verdade { background-color: var(--success); }

      .controls {
        margin-top: 35px;
      }

      button {
        padding: 12px 30px;
        border: none;
        border-radius: 25px;
        background-color: var(--navy);
        color: white;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 0.9rem;
        cursor: pointer;
        transition: transform 0.2s, background-color 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }

      button:hover {
        background-color: #2a476c;
        transform: translateY(-2px);
      }

      footer {
        background-color: var(--navy);
        color: #a8dadc;
        text-align: center;
        padding: 20px;
        font-size: 0.85rem;
        font-family: sans-serif;
      }
    </style>
  </head> 
  <body> 
    <header> 
      <h1>Diário de uma Paixão</h1>
      <p>Mitos e Verdades sobre a obra de Nicholas Sparks</p>
    </header> 
 
    <main> 
      <div class="card-container" onclick="flipCard()">
        <div class="card" id="flashcard">
          <!-- Frente do Cartão -->
          <div class="card-face card-front">
            <h2 id="question-text">Carregando pergunta...</h2>
          </div>
          <!-- Verso do Cartão -->
          <div class="card-face card-back">
            <div class="answer-content">
              <p id="answer-text">Carregando resposta...</p>
              <span id="answer-badge" class="badge">Mito</span>
            </div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button onclick="nextCard()">Próxima Curiosidade</button>
      </div>
    </main> 
 
    <footer> 
      <p>Feito para fãs de Noah e Allie. Clique no cartão para virar.</p>
    </footer> 

    <script>
      // Perguntas baseadas em fatos reais de bastidores e do livro
      const deck = [
        {
          question: "Ryan Gosling e Rachel McAdams (Noah e Allie) não se davam bem no início das filmagens?",
          answer: "Eles brigavam tanto que Ryan chegou a pedir ao diretor para substituir Rachel no set. Depois, eles se apaixonaram e namoraram na vida real.",
          type: "verdade"
        },
        {
          question: "A história do livro é totalmente fictícia e inventada por Nicholas Sparks?",
          answer: "O livro foi inspirado na história real dos avós da ex-esposa do autor, que ficaram casados por mais de 60 anos.",
          type: "mito"
        },
        {
          question: "Ryan Gosling construiu a mesa da cozinha do filme com as próprias mãos?",
          answer: "Para entrar no personagem, Ryan morou em Charleston antes das filmagens e fabricou artesanalmente os móveis usados no cenário.",
          type: "verdade"
        },
        {
          question: "O filme foi gravado exatamente na mesma ordem cronológica dos acontecimentos?",
          answer: "Eles gravaram o final primeiro (com Noah idoso). Ryan Gosling teve que perder muito peso e raspar a barba para gravar as cenas do Noah jovem depois.",
          type: "verdade"
        }
      ];

      let currentIndex = 0;
      const card = document.getElementById('flashcard');
      const questionText = document.getElementById('question-text');
      const answerText = document.getElementById('answer-text');
      const answerBadge = document.getElementById('answer-badge');

      function flipCard() {
        card.classList.toggle('flipped');
      }

      function loadCard(index) {
        questionText.textContent = deck[index].question;
        answerText.textContent = deck[index].answer;
        
        answerBadge.textContent = deck[index].type;
        answerBadge.className = `badge ${deck[index].type}`;
      }

      function nextCard() {
        if (card.classList.contains('flipped')) {
          card.classList.remove('flipped');
          setTimeout(() => {
            currentIndex = (currentIndex + 1) % deck.length;
            loadCard(currentIndex);
          }, 300);
        } else {
          currentIndex = (currentIndex + 1) % deck.length;
          loadCard(currentIndex);
        }
      }

      // Inicialização
      loadCard(currentIndex);
    </script>
  </body> 
</html>
